name: "CI - Test Features"

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-autogenerated:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        features:
          - volta
        baseImage:
          - ghcr.io/umajin/devcontainers:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install latest devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test autogenerated scenarios
        run: |
          devcontainer features test \
            --skip-scenarios \
            -f ${{ matrix.features }} \
            -i ${{ matrix.baseImage }} \
            ./features


  test-scenarios:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        features:
          - volta

    steps:
      - uses: actions/checkout@v4

      - name: Install latest devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test scenarios
        run: |
          devcontainer features test \
            -f ${{ matrix.features }} \
            --skip-autogenerated \
            --skip-duplicated \
            ./features


  test-global:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install latest devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test global scenarios
        run: |
          devcontainer features test \
            --global-scenarios-only \
            ./features