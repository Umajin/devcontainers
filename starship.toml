add_newline = false

format = "$username ➜ $directory$git_branch$character"

[username]
show_always = true
format = "[$user]($style)"

[directory]
home_symbol = "~"
format = "[$path]($style)"

[git_branch]
format = " \\([$branch]($style)\\)"

[character]
success_symbol = "\\$ "
error_symbol = "\\$ "
